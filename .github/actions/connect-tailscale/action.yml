name: Connect Tailscale
description: Connect the CI runner to a Tailscale network for Proxmox access.

inputs:
  oauth-client-id:
    description: Tailscale OAuth client ID
    required: true
  oauth-secret:
    description: Tailscale OAuth secret
    required: true
  tags:
    description: Tailscale tags for the CI runner
    required: false
    default: 'tag:ci-runner'

runs:
  using: composite
  steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        oauth-client-id: ${{ inputs.oauth-client-id }}
        oauth-secret: ${{ inputs.oauth-secret }}
        tags: ${{ inputs.tags }}
