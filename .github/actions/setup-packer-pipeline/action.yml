name: Setup Packer Pipeline
description: >
  Common Packer pipeline setup: resolve template metadata, connect Tailscale,
  configure Proxmox connection variables, configure template variables, and
  install Packer.

inputs:
  template:
    description: Packer template name from the Autolab template catalog
    required: true
  tailscale_oauth_client_id:
    description: Tailscale OAuth client ID
    required: true
  tailscale_oauth_secret:
    description: Tailscale OAuth secret
    required: true
  proxmox_host:
    description: Proxmox Tailscale hostname used as the SSH bastion
    required: true
  pve_ssh_private_key:
    description: Private key used to SSH to Proxmox as the bastion
    required: true
  pve_ssh_username:
    description: Proxmox SSH bastion username
    required: false
    default: root
  proxmox_endpoint:
    description: Proxmox API endpoint URL
    required: true
  proxmox_api_token:
    description: Proxmox API token
    required: true
  proxmox_node_name:
    description: Proxmox node name
    required: true
  proxmox_insecure_tls:
    description: Skip TLS verification for Proxmox
    required: false
    default: 'true'
  ssh_password:
    description: Temporary SSH password used by Packer during provisioning
    required: false
    default: ''
  storage_pool:
    description: Proxmox storage pool for VM disks
    required: false
    default: ''
  network_bridge:
    description: Proxmox bridge for the build VM
    required: false
    default: ''
  cloud_init_storage_pool:
    description: Optional separate storage pool for the cloud-init drive
    required: false
    default: ''
  ssh_public_keys:
    description: Comma-separated public SSH keys to inject via cloud-init
    required: false
    default: ''
  packer_version:
    description: Packer version to install
    required: false
    default: "1.12.0"

runs:
  using: composite
  steps:
    - name: Resolve Packer template
      shell: bash
      run: bash scripts/resolve-packer-template.sh "${{ inputs.template }}" --github-env

    - name: Validate Packer SSH bastion inputs
      shell: bash
      env:
        AUTOLAB_PROXMOX_HOST: ${{ inputs.proxmox_host }}
        AUTOLAB_PVE_SSH_PRIVATE_KEY: ${{ inputs.pve_ssh_private_key }}
      run: |
        set -euo pipefail
        if [[ -z "${AUTOLAB_PROXMOX_HOST}" ]]; then
          echo "ERROR: proxmox_host is required for the Packer SSH bastion." >&2
          exit 1
        fi
        if [[ -z "${AUTOLAB_PVE_SSH_PRIVATE_KEY}" ]]; then
          echo "ERROR: PVE_SSH_PRIVATE_KEY is required for hosted Packer builds." >&2
          echo "Direct host-to-guest routing is not assumed." >&2
          exit 1
        fi

    - uses: ./.github/actions/connect-tailscale
      with:
        oauth-client-id: ${{ inputs.tailscale_oauth_client_id }}
        oauth-secret: ${{ inputs.tailscale_oauth_secret }}

    - name: Configure Packer SSH bastion
      shell: bash
      env:
        AUTOLAB_PROXMOX_HOST: ${{ inputs.proxmox_host }}
        AUTOLAB_PVE_SSH_PRIVATE_KEY: ${{ inputs.pve_ssh_private_key }}
        AUTOLAB_PVE_SSH_USERNAME: ${{ inputs.pve_ssh_username }}
      run: |
        set -euo pipefail
        mkdir -p "${HOME}/.ssh"
        chmod 700 "${HOME}/.ssh"
        printf '%s\n' "${AUTOLAB_PVE_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/pve_ci_key"
        chmod 600 "${HOME}/.ssh/pve_ci_key"
        ssh-keyscan -H "${AUTOLAB_PROXMOX_HOST}" >> "${HOME}/.ssh/known_hosts" 2>/dev/null || true
        source "${GITHUB_WORKSPACE:-${PWD}}/scripts/lib/github-env.sh"
        append_github_env "PKR_VAR_ssh_bastion_host" "${AUTOLAB_PROXMOX_HOST}"
        append_github_env "PKR_VAR_ssh_bastion_username" "${AUTOLAB_PVE_SSH_USERNAME}"
        append_github_env "PKR_VAR_ssh_bastion_private_key_file" "${HOME}/.ssh/pve_ci_key"

    - uses: ./.github/actions/configure-proxmox-connection
      with:
        proxmox_endpoint: ${{ inputs.proxmox_endpoint }}
        proxmox_api_token: ${{ inputs.proxmox_api_token }}
        proxmox_node_name: ${{ inputs.proxmox_node_name }}
        proxmox_insecure_tls: ${{ inputs.proxmox_insecure_tls }}
        emit_tf_vars: 'false'
        emit_packer_vars: 'true'

    - name: Derive temporary Ubuntu installer password hash
      shell: bash
      env:
        AUTOLAB_PACKER_SSH_PASSWORD: ${{ inputs.ssh_password }}
      run: |
        set -euo pipefail
        if [[ -z "${AUTOLAB_PACKER_SSH_PASSWORD}" ]]; then
          echo "ERROR: ssh_password is required for Packer template builds." >&2
          exit 1
        fi
        packer_password_hash="$(printf '%s\n' "${AUTOLAB_PACKER_SSH_PASSWORD}" | openssl passwd -6 -stdin)"
        echo "::add-mask::${packer_password_hash}"
        export PKR_VAR_packer_password_hash="${packer_password_hash}"
        source "${GITHUB_WORKSPACE:-${PWD}}/scripts/lib/github-env.sh"
        append_github_env "PKR_VAR_packer_password_hash" "${packer_password_hash}"
        unset AUTOLAB_PACKER_SSH_PASSWORD packer_password_hash

    - uses: ./.github/actions/configure-packer-template
      with:
        ssh_password: ${{ inputs.ssh_password }}
        storage_pool: ${{ inputs.storage_pool }}
        network_bridge: ${{ inputs.network_bridge }}
        cloud_init_storage_pool: ${{ inputs.cloud_init_storage_pool }}
        ssh_public_keys: ${{ inputs.ssh_public_keys }}

    - name: Install seed CD tooling
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq xorriso

    - name: Setup Packer
      uses: hashicorp/setup-packer@main
      with:
        version: ${{ inputs.packer_version }}
