name: Configure Packer Template
description: >
  Write Packer template-specific environment variables.
  AUTO-GENERATED by scripts/generate-packer-template-adapters.sh from
  infra/packer/template-schema.yaml. Do not edit manually.

inputs:
  ssh_password:
    description: Temporary SSH password used by Packer during provisioning
    required: false
    default: ''
  storage_pool:
    description: Proxmox storage pool for VM disks
    required: false
    default: ''
  network_bridge:
    description: Proxmox bridge for the build VM
    required: false
    default: ''
  iso_file:
    description: Proxmox ISO storage path for the installer ISO
    required: false
    default: ''
  iso_checksum:
    description: Checksum for the ISO file. Empty skips verification.
    required: false
    default: ''
  cloud_init_storage_pool:
    description: Optional separate storage pool for the cloud-init drive
    required: false
    default: ''
  ssh_public_keys:
    description: Public SSH keys to inject via cloud-init
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Configure Packer template variables
      shell: bash
      env:
        AUTOLAB_INPUT_SSH_PASSWORD: ${{ inputs.ssh_password }}
        AUTOLAB_INPUT_STORAGE_POOL: ${{ inputs.storage_pool }}
        AUTOLAB_INPUT_NETWORK_BRIDGE: ${{ inputs.network_bridge }}
        AUTOLAB_INPUT_ISO_FILE: ${{ inputs.iso_file }}
        AUTOLAB_INPUT_ISO_CHECKSUM: ${{ inputs.iso_checksum }}
        AUTOLAB_INPUT_CLOUD_INIT_STORAGE_POOL: ${{ inputs.cloud_init_storage_pool }}
        AUTOLAB_INPUT_SSH_PUBLIC_KEYS: ${{ inputs.ssh_public_keys }}
      run: |
        source "${GITHUB_WORKSPACE:-${PWD}}/scripts/lib/github-env.sh"

        csv_to_packer_string_list() {
          local raw="$1"
          local result="["
          local first=1
          local item
          local old_ifs="$IFS"
          IFS=','
          for item in $raw; do
            item="${item#"${item%%[![:space:]]*}"}"
            item="${item%"${item##*[![:space:]]}"}"
            if [[ -z "$item" ]]; then
              continue
            fi
            item="${item//\\/\\\\}"
            item="${item//\"/\\\"}"
            if [[ "$first" -eq 0 ]]; then
              result+=", "
            fi
            result+="\"${item}\""
            first=0
          done
          IFS="$old_ifs"
          result+="]"
          printf '%s' "$result"
        }

        if [[ -n "$AUTOLAB_INPUT_SSH_PASSWORD" ]]; then
          append_github_env "PKR_VAR_ssh_password" "$AUTOLAB_INPUT_SSH_PASSWORD"
        fi

        if [[ -n "$AUTOLAB_INPUT_STORAGE_POOL" ]]; then
          append_github_env "PKR_VAR_storage_pool" "$AUTOLAB_INPUT_STORAGE_POOL"
        fi

        if [[ -n "$AUTOLAB_INPUT_NETWORK_BRIDGE" ]]; then
          append_github_env "PKR_VAR_network_bridge" "$AUTOLAB_INPUT_NETWORK_BRIDGE"
        fi

        if [[ -n "$AUTOLAB_INPUT_ISO_FILE" ]]; then
          append_github_env "PKR_VAR_iso_file" "$AUTOLAB_INPUT_ISO_FILE"
        fi

        if [[ -n "$AUTOLAB_INPUT_ISO_CHECKSUM" ]]; then
          append_github_env "PKR_VAR_iso_checksum" "$AUTOLAB_INPUT_ISO_CHECKSUM"
        fi

        if [[ -n "$AUTOLAB_INPUT_CLOUD_INIT_STORAGE_POOL" ]]; then
          append_github_env "PKR_VAR_cloud_init_storage_pool" "$AUTOLAB_INPUT_CLOUD_INIT_STORAGE_POOL"
        fi

        if [[ -n "$AUTOLAB_INPUT_SSH_PUBLIC_KEYS" ]]; then
          append_github_env "PKR_VAR_ssh_public_keys" "$(csv_to_packer_string_list "$AUTOLAB_INPUT_SSH_PUBLIC_KEYS")"
        fi

