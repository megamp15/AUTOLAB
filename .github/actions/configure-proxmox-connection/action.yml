name: Configure Proxmox Connection
description: >
  Write Proxmox connection environment variables for OpenTofu and/or Packer.
  AUTO-GENERATED by scripts/generate-connection-adapters.sh from
  infra/connection-schema.yaml. Do not edit manually.

inputs:
  proxmox_endpoint:
    description: Proxmox API endpoint URL (must be HTTPS)
    required: true
  proxmox_api_token:
    description: Proxmox API token in USER@REALM!TOKENID=TOKEN_SECRET format
    required: true
  proxmox_node_name:
    description: Proxmox node name shown in the UI
    required: true
  proxmox_insecure_tls:
    description: Allow self-signed Proxmox TLS certificates
    required: false
    default: 'true'
  emit_tf_vars:
    description: Write TF_VAR_ environment variables
    required: false
    default: 'true'
  emit_packer_vars:
    description: Write PKR_VAR_ environment variables
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Configure Proxmox connection variables
      shell: bash
      env:
        AUTOLAB_INPUT_PROXMOX_ENDPOINT: ${{ inputs.proxmox_endpoint }}
        AUTOLAB_INPUT_PROXMOX_API_TOKEN: ${{ inputs.proxmox_api_token }}
        AUTOLAB_INPUT_PROXMOX_NODE_NAME: ${{ inputs.proxmox_node_name }}
        AUTOLAB_INPUT_PROXMOX_INSECURE_TLS: ${{ inputs.proxmox_insecure_tls }}
      run: |
        source "${GITHUB_WORKSPACE:-${PWD}}/scripts/lib/github-env.sh"

        if [[ '${{ inputs.emit_tf_vars }}' == 'true' ]]; then
          append_github_env "TF_VAR_proxmox_endpoint" "$AUTOLAB_INPUT_PROXMOX_ENDPOINT"
          append_github_env "TF_VAR_proxmox_api_token" "$AUTOLAB_INPUT_PROXMOX_API_TOKEN"
          append_github_env "TF_VAR_proxmox_node_name" "$AUTOLAB_INPUT_PROXMOX_NODE_NAME"
          append_github_env "TF_VAR_proxmox_insecure_tls" "$AUTOLAB_INPUT_PROXMOX_INSECURE_TLS"
        fi

        if [[ '${{ inputs.emit_packer_vars }}' == 'true' ]]; then
          append_github_env "PKR_VAR_proxmox_endpoint" "$AUTOLAB_INPUT_PROXMOX_ENDPOINT"
          append_github_env "PKR_VAR_proxmox_api_token" "$AUTOLAB_INPUT_PROXMOX_API_TOKEN"
          append_github_env "PKR_VAR_proxmox_node_name" "$AUTOLAB_INPUT_PROXMOX_NODE_NAME"
          append_github_env "PKR_VAR_proxmox_insecure_tls" "$AUTOLAB_INPUT_PROXMOX_INSECURE_TLS"
        fi
