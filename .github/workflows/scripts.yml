name: Scripts

on:
  push:
    paths:
      - 'docs/proxmox/scripts/**'
      - 'scripts/**'
      - 'infra/**'
      - '.github/actions/**'
      - 'infra/connection-schema.yaml'
      - 'infra/r2-config.yaml'
      - 'docs/proxmox/config/network-env-schema.yaml'
      - '.github/workflows/scripts.yml'
  pull_request:
    paths:
      - 'docs/proxmox/scripts/**'
      - 'scripts/**'
      - 'infra/**'
      - '.github/actions/**'
      - 'infra/connection-schema.yaml'
      - 'infra/r2-config.yaml'
      - 'docs/proxmox/config/network-env-schema.yaml'
      - '.github/workflows/scripts.yml'

jobs:
  shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check (all scripts)
        run: |
          find docs/proxmox/scripts scripts -name '*.sh' -print0 | while IFS= read -r -d '' f; do
            echo "==> $f"
            bash -n "$f"
          done

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Check schema drift
        run: bash scripts/check-schema-drift.sh

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Validate generated OpenTofu artifacts
        run: |
          tofu fmt -check -recursive infra
          tofu -chdir=infra/stacks/lab init -backend=false -input=false
          tofu -chdir=infra/stacks/lab validate

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Install seed CD tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xorriso

      - name: Validate generated Packer artifacts
        run: |
          for template in debian-13 ubuntu-26.04; do
            eval "$(bash scripts/resolve-packer-template.sh "$template")"
            export PKR_VAR_vm_id PKR_VAR_vm_template_name PKR_VAR_iso_url PKR_VAR_iso_checksum
            export PKR_VAR_ssh_bastion_host=pve.example.ts.net
            export PKR_VAR_ssh_bastion_username=root
            export PKR_VAR_ssh_bastion_private_key_file=/tmp/validation-bastion-key
            export PKR_VAR_ssh_password=validation-only
            export PKR_VAR_packer_password_hash="$(printf '%s\n' validation-only | openssl passwd -6 -stdin)"
            (
              cd "$AUTOLAB_PACKER_TEMPLATE_DIR"
              packer init .
              packer validate \
                -var 'proxmox_endpoint=https://pve.example.ts.net:8006' \
                -var 'proxmox_api_token=USER@pam!TOKENID=TOKEN_SECRET' \
                -var 'proxmox_node_name=pve' \
                .
            )
          done

      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Run bats tests
        run: bats docs/proxmox/scripts/tests/
