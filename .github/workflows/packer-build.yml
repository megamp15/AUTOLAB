name: Packer Build

run-name: Build ${{ inputs.template }} Packer template

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Template to build"
        required: true
        default: debian-13
        type: choice
        options:
          - debian-13
          - ubuntu-26.04

permissions:
  contents: read

concurrency:
  group: packer-build
  cancel-in-progress: false

jobs:
  build-template:
    name: Build ${{ inputs.template }} template
    runs-on: ubuntu-latest
    env:
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-packer-pipeline
        with:
          template: ${{ inputs.template }}
          tailscale_oauth_client_id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale_oauth_secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          proxmox_host: ${{ vars.PROXMOX_HOST }}
          pve_ssh_username: root
          proxmox_endpoint: ${{ vars.PROXMOX_ENDPOINT }}
          proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          proxmox_node_name: ${{ vars.PROXMOX_NODE_NAME }}
          proxmox_insecure_tls: ${{ vars.PROXMOX_INSECURE_TLS || 'true' }}
          ssh_password: ${{ secrets.PACKER_SSH_PASSWORD }}
          pve_ssh_private_key: ${{ secrets.PVE_SSH_PRIVATE_KEY }}
          storage_pool: ${{ vars.PROXMOX_STORAGE_POOL }}
          network_bridge: ${{ vars.PROXMOX_NETWORK_BRIDGE }}
          cloud_init_storage_pool: ${{ vars.PROXMOX_CLOUD_INIT_STORAGE_POOL }}
          ssh_public_keys: ${{ vars.SSH_PUBLIC_KEYS }}

      - name: Verify Tailscale connectivity
        run: |
          echo "Waiting for Tailscale routing to establish..."
          sleep 5
          tailscale status
          echo "Checking connectivity to PVE..."
          tailscale ping ${{ vars.PROXMOX_HOST }} || true

      - name: Initialize Packer
        working-directory: ${{ env.AUTOLAB_PACKER_TEMPLATE_DIR }}
        run: packer init .

      - name: Validate Packer configuration
        working-directory: ${{ env.AUTOLAB_PACKER_TEMPLATE_DIR }}
        run: packer validate .

      - name: Build template
        working-directory: ${{ env.AUTOLAB_PACKER_TEMPLATE_DIR }}
        run: |
          echo "========================================================"
          echo "🔨 BUILDING PROXMOX VM TEMPLATE: ${{ inputs.template }}"
          echo "========================================================"
          echo "   • Catalog entry: ${AUTOLAB_PACKER_TEMPLATE_DESCRIPTION}"
          echo "   • Template file: ${AUTOLAB_PACKER_TEMPLATE_FILE}"
          echo "========================================================"

          packer build .

      - name: Build summary
        if: always()
        run: |
          echo "========================================================"
          echo "🏗️ PACKER BUILD COMPLETED"
          echo "========================================================"
          echo "📋 Summary:"
          echo "   • Template: ${{ inputs.template }}"
          echo "   • Status: ${{ job.status }}"
          echo "========================================================"
          echo ""
          echo "📝 Next Steps:"
          echo "   1. Run OpenTofu Plan to verify the template is available"
          echo "   2. Run OpenTofu Apply to create VMs from this template"
          echo "========================================================"
