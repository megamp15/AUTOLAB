name: OpenTofu Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Stack name under infra/stacks
        required: true
        default: lab
      plan_mode:
        description: Plan handling mode
        required: true
        default: fresh
        type: choice
        options:
          - fresh
          - saved-plan
      plan_run_id:
        description: Workflow run ID that uploaded the saved binary plan. Required only for saved-plan mode.
        required: false
      plan_artifact_name:
        description: Binary plan artifact name. Required only for saved-plan mode.
        required: false
        default: ''
      parallelism:
        description: "OpenTofu parallelism (1 = sequential, safe for Proxmox; 10 = default parallel)"
        type: choice
        required: false
        default: "1"
        options:
          - "1"
          - "10"
      confirm:
        description: Type apply to confirm
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: opentofu-state
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: 'true'
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.context.outputs.environment }}
      env_dir: ${{ steps.context.outputs.env_dir }}
      plan_artifact_name: ${{ steps.artifacts.outputs.plan_artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/opentofu-preflight
        id: context
        with:
          environment: ${{ inputs.environment }}

      - name: Validate inputs
        run: |
          if [ "${{ inputs.confirm }}" != "apply" ]; then
            echo "Type apply in the confirm input to run this workflow."
            exit 1
          fi

          if [ "${{ inputs.plan_mode }}" = "saved-plan" ] && [ -z "${{ inputs.plan_run_id }}" ]; then
            echo "saved-plan mode requires plan_run_id."
            exit 1
          fi

      - name: Compute artifact names
        id: artifacts
        run: |
          plan_artifact_name="${{ inputs.plan_artifact_name }}"
          if [ -z "$plan_artifact_name" ]; then
            plan_artifact_name="opentofu-${{ steps.context.outputs.environment }}-tfplan"
          fi
          echo "plan_artifact_name=$plan_artifact_name" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always()
        run: |
          {
            echo "## OpenTofu Apply Preflight"
            echo
            echo "- Environment: \`${{ steps.context.outputs.environment }}\`"
            echo "- Plan mode: \`${{ inputs.plan_mode }}\`"
            echo "- Directory: \`${{ steps.context.outputs.env_dir }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    needs: preflight
    if: inputs.confirm == 'apply'
    runs-on: ubuntu-latest
    environment: autolab-apply
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-opentofu-pipeline
        with:
          env_dir: ${{ needs.preflight.outputs.env_dir }}
          tailscale_oauth_client_id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale_oauth_secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          proxmox_insecure_tls: ${{ vars.PROXMOX_INSECURE_TLS || 'true' }}
          proxmox_node_name: ${{ vars.PROXMOX_NODE_NAME }}
          tailscale_auth_key: ${{ secrets.TAILSCALE_VM_AUTHKEY }}
          r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2_account_id: ${{ secrets.R2_ACCOUNT_ID }}

      - name: Download saved binary plan
        if: inputs.plan_mode == 'saved-plan'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.preflight.outputs.plan_artifact_name }}
          path: ${{ needs.preflight.outputs.env_dir }}/saved-plan
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Fresh plan before apply
        if: inputs.plan_mode == 'fresh'
        id: fresh_plan
        working-directory: ${{ needs.preflight.outputs.env_dir }}
        run: bash ${{ github.workspace }}/scripts/tofu-plan.sh --parallelism "${{ inputs.parallelism || '1' }}" --summary-default "Fresh plan completed."

      - name: Apply fresh plan
        if: inputs.plan_mode == 'fresh'
        working-directory: ${{ needs.preflight.outputs.env_dir }}
        run: bash ${{ github.workspace }}/scripts/tofu-apply-with-retry.sh tfplan ${{ inputs.parallelism || '1' }}

      - name: Show saved plan
        if: inputs.plan_mode == 'saved-plan'
        working-directory: ${{ needs.preflight.outputs.env_dir }}
        run: |
          cp saved-plan/tfplan tfplan
          tofu show -no-color tfplan > plan.txt
          cat plan.txt

      - name: Apply saved plan
        if: inputs.plan_mode == 'saved-plan'
        working-directory: ${{ needs.preflight.outputs.env_dir }}
        run: bash ${{ github.workspace }}/scripts/tofu-apply-with-retry.sh tfplan ${{ inputs.parallelism || '1' }}

      - name: Verify Tailscale connectivity
        if: inputs.plan_mode == 'fresh' || inputs.plan_mode == 'saved-plan'
        continue-on-error: true
        run: |
          echo "Waiting 2 minutes for VMs/LXCs to boot and run cloud-init..."
          sleep 120

          echo "Tailscale peers visible from CI runner:"
          tailscale status

          echo "Checking for expected Autolab VMs/LXCs in Tailscale..."
          echo "Note: VMs/LXCs that just joined may take a few more minutes to appear."
          echo "If some are missing, check cloud-init logs on the Proxmox host."

      - name: Upload apply log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opentofu-${{ needs.preflight.outputs.environment }}-apply
          path: ${{ needs.preflight.outputs.env_dir }}/apply.txt
          retention-days: 3

      - name: Upload applied plan text
        if: always() && hashFiles(format('{0}/plan.txt', needs.preflight.outputs.env_dir)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: opentofu-${{ needs.preflight.outputs.environment }}-applied-plan-text
          path: ${{ needs.preflight.outputs.env_dir }}/plan.txt
          retention-days: 3

      - name: Job summary
        if: always()
        working-directory: ${{ needs.preflight.outputs.env_dir }}
        run: |
          apply_summary="Apply did not complete."
          if [ -f apply.txt ]; then
            apply_summary="$(grep -E '^Apply complete!' apply.txt | tail -n 1 || true)"
          fi

          {
            echo "## OpenTofu Apply"
            echo
            echo "- Environment: \`${{ needs.preflight.outputs.environment }}\`"
            echo "- Plan mode: \`${{ inputs.plan_mode }}\`"
            echo "- Saved plan artifact: \`${{ needs.preflight.outputs.plan_artifact_name }}\`"
            echo "- Result: \`${{ job.status }}\`"
            echo "- Fresh plan changes: \`${{ steps.fresh_plan.outputs.has_changes || 'not applicable' }}\`"
            echo "- Fresh plan summary: ${{ steps.fresh_plan.outputs.summary_line || 'not applicable' }}"
            echo "- Apply summary: ${apply_summary:-Review the uploaded apply log.}"
            echo
            echo "Use fresh mode for the safest default. Use saved-plan mode only when you intentionally uploaded a binary plan artifact from a trusted plan run."
          } >> "$GITHUB_STEP_SUMMARY"

  apply-rejected:
    name: Apply Rejected
    runs-on: ubuntu-latest
    if: inputs.confirm != 'apply'
    steps:
      - name: Rejection Notice
        run: |
          echo "========================================================"
          echo "❌ OPENTOFU APPLY REJECTED"
          echo "========================================================"
          echo "You must type 'apply' in the confirm field to apply changes."
          echo "========================================================"
          exit 1